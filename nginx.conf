server {
    # Host networking: nginx binds the published port directly on the host.
    listen 8086;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Glances API (glances runs on host networking → reachable on loopback).
    # This dashboard is PUBLIC and unauthenticated, so the proxy is a strict
    # allowlist: only the exact endpoints the UI needs are forwarded. processlist
    # is exposed only field-by-field (no cmdline / username), and /all, /pluginslist
    # and every other plugin fall through to the 403 below. The regex location is
    # matched before the prefix one, so the prefix acts as deny-by-default.
    location ~ ^/glances/(api/3/(cpu|mem|containers|sensors|network|fs|uptime|processlist/(pid|name|cpu_percent|memory_info)))$ {
        proxy_pass http://127.0.0.1:61208/$1;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
    location /glances/ { return 403; }

    # Proxy GPU stats sidecar (bridge container, published on the host)
    location = /gpu-stats/gpu {
        proxy_pass http://127.0.0.1:61211/gpu;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
    location /gpu-stats/ { return 403; }

    # Proxy Glances API — Raspberry Pi (only basic telemetry).
    # Short timeouts so a powered-off Pi fails fast (the panel goes OFFLINE)
    # instead of hanging on nginx's 60s default and stacking up polls.
    location ~ ^/rpi-glances/(api/4/(cpu|mem|sensors|uptime))$ {
        proxy_pass http://192.168.1.145:61208/$1;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
    location /rpi-glances/ { return 403; }

    # Iconos locales
    location /icons/ {
        alias /usr/share/nginx/html/icons/;
    }
}
