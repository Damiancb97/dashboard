server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Glances API
    location /glances/ {
        proxy_pass http://host.docker.internal:61208/;
        proxy_set_header Host $host;
    }

    # Proxy GPU stats sidecar
    location /gpu-stats/ {
        proxy_pass http://host.docker.internal:61211/;
        proxy_set_header Host $host;
    }

    # Proxy Glances API — Raspberry Pi
    location /rpi-glances/ {
        proxy_pass http://192.168.1.145:61208/;
        proxy_set_header Host $host;
    }

    # Iconos locales
    location /icons/ {
        alias /usr/share/nginx/html/icons/;
    }
}
