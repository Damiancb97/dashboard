server {
    # Host networking: nginx binds the published port directly on the host.
    listen 8086;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Glances API (glances runs on host networking → reachable on loopback)
    location /glances/ {
        proxy_pass http://127.0.0.1:61208/;
        proxy_set_header Host $host;
    }

    # Proxy GPU stats sidecar (bridge container, published on the host)
    location /gpu-stats/ {
        proxy_pass http://127.0.0.1:61211/;
        proxy_set_header Host $host;
    }

    # Proxy Glances API — Raspberry Pi
    location /rpi-glances/ {
        proxy_pass http://192.168.1.145:61208/;
        proxy_set_header Host $host;
    }

    # Iconos locales
    location /icons/ {
        alias /usr/share/nginx/html/icons/;
    }
}
