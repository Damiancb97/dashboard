<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13161d"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4f9dff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- dark rounded tile -->
  <rect x="1" y="1" width="30" height="30" rx="7.5"
        fill="url(#tile)" stroke="#2dd4bf" stroke-opacity="0.38" stroke-width="1"/>

  <!-- faint baseline / axis -->
  <line x1="5" y1="26" x2="27" y2="26" stroke="#2dd4bf" stroke-opacity="0.18" stroke-width="1"/>

  <!-- ascending stat bars (teal -> blue) -->
  <g>
    <rect x="5"  y="17" width="4" height="9"  rx="1.1" fill="url(#bar)" fill-opacity="0.85"/>
    <rect x="11" y="13" width="4" height="13" rx="1.1" fill="url(#bar)" fill-opacity="0.9"/>
    <rect x="17" y="15" width="4" height="11" rx="1.1" fill="url(#bar)" fill-opacity="0.9"/>
    <rect x="23" y="8"  width="4" height="18" rx="1.1" fill="url(#bar)"/>
  </g>

  <!-- trend line -->
  <polyline points="7,14 13,10 19,12 25,5" fill="none"
            stroke="#7ff5e6" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- nodes, peak accent glowing -->
  <g fill="#7ff5e6">
    <circle cx="7"  cy="14" r="0.9"/>
    <circle cx="13" cy="10" r="0.9"/>
    <circle cx="19" cy="12" r="0.9"/>
    <circle cx="25" cy="5"  r="1.4" filter="url(#glow)"/>
  </g>
</svg>
